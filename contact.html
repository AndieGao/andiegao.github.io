<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Andie Gao</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #fafaf8;
  --surface: #ffffff;
  --ink:     #1a1917;
  --muted:   #9a9490;
  --border:  rgba(26,25,23,.1);
  --dot:     rgba(26,25,23,.065);
  --red:     #e75555;
  --green:   #a9e185;
  --teal:    #6cdcdf;
  --yellow:  #f4df62;
  --pink:    #f47cbf;
  --sans:    'Nunito', system-ui, sans-serif;
  --hand:    'Caveat', cursive;
}
body.dark {
  --bg:      #131311;
  --surface: #1c1b19;
  --ink:     #ede8df;
  --muted:   #706a62;
  --border:  rgba(237,232,223,.1);
  --dot:     rgba(237,232,223,.1);
}
body.dark nav.scrolled { background: rgba(19,19,17,.93); }
body.dark .contact-page { background-image: radial-gradient(circle, var(--dot) 1.5px, transparent 1.5px); }
body.dark .form-card { background: var(--surface); border-color: rgba(237,232,223,.12); }
body.dark .form-card input, body.dark .form-card textarea { background: var(--bg); border-color: rgba(237,232,223,.12); color: var(--ink); }
body.dark .contact-big-text { color: var(--ink); }

html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: var(--sans); overflow-x: hidden; cursor: none;
  transition: background .35s, color .35s;
}
@media (hover: none) { body { cursor: auto; } .cursor-dot { display: none; } }

/* ── CURSOR ── */
.cursor-dot {
  position: fixed; top: 0; left: 0;
  width: 10px; height: 10px;
  background: var(--ink); border-radius: 50%;
  pointer-events: none; z-index: 9995;
  will-change: transform;
  transition: width .2s, height .2s, background .2s;
}
.cursor-dot.big { width: 14px; height: 14px; border-radius: 3px; background: var(--teal); }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 52px;
  transition: background .3s, box-shadow .3s;
}
nav.scrolled {
  background: rgba(250,250,248,.93);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  box-shadow: 0 1px 0 var(--border);
}
.nav-logo {
  font-size: 17px; font-weight: 900; color: var(--ink);
  text-decoration: none; letter-spacing: -.01em;
}
.nav-links { display: flex; gap: 4px; list-style: none; }
.nav-links a {
  display: flex; align-items: center; gap: 5px;
  font-size: 13px; font-weight: 700; color: var(--muted);
  text-decoration: none; padding: 6px 16px; border-radius: 999px;
  transition: all .2s;
}
.nav-links a:hover { background: var(--ink); color: white; }
.nav-links a.active { background: var(--ink); color: white; }
.theme-toggle {
  width: 40px; height: 40px; border: 1.5px solid var(--border);
  border-radius: 50%; background: var(--surface); font-size: 18px;
  cursor: none; display: flex; align-items: center; justify-content: center;
  transition: transform .25s, border-color .25s; flex-shrink: 0;
}
.theme-toggle:hover { transform: scale(1.12) rotate(15deg); border-color: var(--ink); }
body.dark .theme-toggle { background: var(--surface); border-color: var(--border); }

/* ── PAGE ── */
.contact-page {
  min-height: 100vh;
  padding: 100px 52px 80px;
  display: flex; flex-direction: column; align-items: center;
  position: relative; overflow: hidden;
  background-image: radial-gradient(circle, var(--dot) 1.5px, transparent 1.5px);
  background-size: 28px 28px;
}

/* big heading */
.contact-hand {
  font-family: var(--hand);
  font-size: 22px; color: var(--muted);
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 10px;
  animation: fadeIn .7s .1s both;
}
.contact-hand::after {
  content: '';
  display: inline-block;
  width: 36px; height: 2px;
  background: var(--muted); border-radius: 2px;
}
.contact-big-text {
  font-size: clamp(64px,12vw,160px);
  font-weight: 900; letter-spacing: -.04em; line-height: .88;
  text-align: center; color: var(--ink);
  margin-bottom: 48px;
  animation: fadeUp .9s .2s both;
  position: relative; z-index: 2;
}
.contact-big-text .sel-decoration {
  position: absolute; inset: -12px;
  border: 1.5px dashed #0095FF;
  border-radius: 4px;
  display: flex; align-items: flex-start; justify-content: flex-start;
  pointer-events: none;
}
.sel-corner {
  position: absolute;
  width: 9px; height: 9px;
  background: white; border: 1.5px solid #0095FF; border-radius: 2px;
}
.sel-corner.tl { top:-4px; left:-4px; }
.sel-corner.tr { top:-4px; right:-4px; }
.sel-corner.bl { bottom:-4px; left:-4px; }
.sel-corner.br { bottom:-4px; right:-4px; }
.sel-tag-top {
  position: absolute; top: -28px; left: 0;
  background: #0095FF; color: white;
  font-family: var(--sans); font-size: 10px; font-weight: 700;
  padding: 3px 10px; border-radius: 5px; letter-spacing: .06em;
  white-space: nowrap;
}

/* form card */
.form-card {
  width: 100%; max-width: 580px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 36px 40px;
  position: relative; z-index: 2;
  animation: fadeUp .8s .4s both;
  box-shadow: 0 4px 32px rgba(0,0,0,.07);
}
.form-label {
  font-size: 11px; font-weight: 900;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 20px; display: block;
}
.form-card textarea {
  width: 100%; min-height: 130px;
  border: 1.5px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  font-family: var(--sans); font-size: 15px; font-weight: 400;
  color: var(--ink); background: var(--bg);
  resize: vertical; outline: none;
  transition: border-color .2s;
  margin-bottom: 14px;
}
.form-card textarea:focus { border-color: var(--teal); }
.form-card textarea::placeholder { color: var(--muted); }
.form-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-bottom: 20px;
}
.form-card input {
  width: 100%; border: 1.5px solid var(--border);
  border-radius: 12px; padding: 12px 16px;
  font-family: var(--sans); font-size: 14px; font-weight: 400;
  color: var(--ink); background: var(--bg);
  outline: none; transition: border-color .2s;
}
.form-card input:focus { border-color: var(--teal); }
.form-card input::placeholder { color: var(--muted); }
.form-submit {
  width: 100%; padding: 14px;
  background: var(--ink); color: white;
  border: none; border-radius: 12px;
  font-family: var(--sans); font-size: 13px; font-weight: 900;
  letter-spacing: .12em; text-transform: uppercase;
  cursor: none; transition: all .25s;
}
.form-submit:hover { background: var(--pink); transform: translateY(-1px); }

/* OR email directly */
.contact-or {
  font-family: var(--hand);
  font-size: 18px; color: var(--muted);
  margin: 20px 0 8px; position: relative; z-index: 2;
  animation: fadeIn .8s .6s both;
}
.contact-direct-email {
  font-size: clamp(16px,2vw,22px); font-weight: 700;
  color: var(--teal); text-decoration: none;
  position: relative; z-index: 2;
  animation: fadeIn .8s .7s both;
}
.contact-direct-email::after {
  content: ''; position: absolute; bottom: -2px; left: 0;
  width: 100%; height: 2px; background: var(--teal);
  transform: scaleX(0); transform-origin: left;
  transition: transform .35s cubic-bezier(.16,1,.3,1);
}
.contact-direct-email:hover::after { transform: scaleX(1); }

/* availability */
.contact-avail {
  font-family: var(--hand);
  font-size: 20px; color: var(--muted);
  margin-top: 40px; position: relative; z-index: 2;
  animation: fadeIn .8s .8s both;
  display: flex; align-items: center; gap: 10px;
}
.contact-avail::before {
  content: '→';
  color: var(--pink); font-size: 22px;
}

/* socials */
.contact-socials {
  display: flex; gap: 12px;
  margin-top: 20px; position: relative; z-index: 2;
  animation: fadeIn .8s .9s both;
}
.contact-socials a {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
  padding: 8px 18px; border-radius: 999px;
  border: 1.5px solid var(--border);
  color: var(--muted); text-decoration: none;
  transition: all .2s; background: var(--surface);
}
.contact-socials a:hover { background: var(--ink); color: white; border-color: var(--ink); }

/* decorative polaroids */
.pol {
  position: absolute;
  background: white;
  padding: 10px 10px 36px;
  border-radius: 4px;
  box-shadow: 0 6px 28px rgba(0,0,0,.12);
  z-index: 1;
  pointer-events: none;
}
.pol-img { border-radius: 2px; display: block; }
.pol-label {
  font-family: var(--hand); font-size: 14px;
  color: #888; text-align: center;
  margin-top: 10px;
}
.pol-left  { bottom: 18%; left: 4%;  transform: rotate(-7deg); animation: fadeIn 1s .6s both; }
.pol-right { top: 22%;    right: 4%; transform: rotate(6deg);  animation: fadeIn 1s .8s both; }

/* footer */
.contact-footer {
  margin-top: 48px; position: relative; z-index: 2;
  font-size: 12px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--muted);
  display: flex; gap: 24px; align-items: center;
  animation: fadeIn 1s 1s both;
}
.contact-footer a { color: var(--muted); text-decoration: none; transition: color .2s; }
.contact-footer a:hover { color: var(--ink); }

@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes fadeUp  { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

@media (max-width: 768px) {
  nav { padding: 16px 24px; }
  .contact-page { padding: 90px 24px 60px; }
  .form-row { grid-template-columns: 1fr; }
  .form-card { padding: 28px 24px; }
  .pol { display: none; }
}
</style>
</head>
<body>

<div class="cursor-dot" id="cursorDot"></div>

<nav id="mainNav">
  <a href="index.html" class="nav-logo">✦ Andie Gao</a>
  <ul class="nav-links">
    <li><a href="index.html#works">🗂 Work</a></li>
    <li><a href="index.html#about">👋 About</a></li>
    <li><a href="playground.html">🎨 Playground</a></li>
    <li><a href="contact.html" class="active">✉️ Contact</a></li>
  </ul>
  <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
</nav>

<main class="contact-page">

  <p class="contact-hand">leave me a note</p>

  <h1 class="contact-big-text">
    CONTACT
    <div class="sel-decoration">
      <span class="sel-corner tl"></span>
      <span class="sel-corner tr"></span>
      <span class="sel-corner bl"></span>
      <span class="sel-corner br"></span>
      <span class="sel-tag-top">contact.fig ✦</span>
    </div>
  </h1>

  <div class="form-card">
    <span class="form-label">What's on your mind?</span>
    <!-- Replace action with your FormSpree endpoint for real submissions -->
    <form action="mailto:ziqigao0526@gmail.com" method="post" enctype="text/plain">
      <textarea name="message" placeholder="Tell me about a project, collab idea, or just say hi ✦"></textarea>
      <div class="form-row">
        <input type="text"  name="name"  placeholder="Your name">
        <input type="email" name="email" placeholder="your@email.com">
      </div>
      <button type="submit" class="form-submit">Send it →</button>
    </form>
  </div>

  <p class="contact-or">or just email directly</p>
  <a href="mailto:ziqigao0526@gmail.com" class="contact-direct-email">ziqigao0526@gmail.com</a>

  <p class="contact-avail">I'm available for new projects!</p>

  <div class="contact-socials">
    <a href="https://www.linkedin.com/in/andiegao/" target="_blank">💼 LinkedIn</a>
    <a href="https://www.instagram.com/" target="_blank">📷 Instagram</a>
  </div>

  <!-- decorative polaroid-style elements -->
  <div class="pol pol-left">
    <div class="pol-img" style="width:160px;height:120px;background:linear-gradient(135deg,#6cdcdf,#a9e185);border-radius:2px;"></div>
    <p class="pol-label">random shot</p>
  </div>
  <div class="pol pol-right">
    <div class="pol-img" style="width:150px;height:115px;background:linear-gradient(135deg,#9060d0,#f47cbf);border-radius:2px;"></div>
    <p class="pol-label">tiny moment!</p>
  </div>

  <div class="contact-footer">
    <a href="index.html">← Back home</a>
    <span>© 2026 Andie Gao</span>
  </div>

</main>

<script>
(function () {
  const dot    = document.getElementById('cursorDot');
  const nav    = document.getElementById('mainNav');
  const toggle = document.getElementById('themeToggle');

  // sync theme
  const saved = localStorage.getItem('ag-theme');
  if (saved === 'dark') { document.body.classList.add('dark'); toggle.textContent = '☀️'; }
  toggle.addEventListener('click', () => {
    const isDark = document.body.classList.toggle('dark');
    toggle.textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem('ag-theme', isDark ? 'dark' : 'light');
  });

  // cursor
  document.addEventListener('mousemove', e => {
    dot.style.transform = `translate(${e.clientX-5}px,${e.clientY-5}px)`;
  });
  document.querySelectorAll('a,button,input,textarea').forEach(el => {
    el.addEventListener('mouseenter', () => dot.classList.add('big'));
    el.addEventListener('mouseleave', () => dot.classList.remove('big'));
  });

  // nav scroll
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 40);
  }, { passive: true });
})();
</script>
</body>
</html>
